name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      - run: ./scripts/test.sh
      - run: ./scripts/lint.sh
      - run: ./scripts/typecheck.sh
      - run: ./scripts/validate-workflow.sh WORKFLOW.example.md
      - run: uv run python scripts/lint-knowledge.py
