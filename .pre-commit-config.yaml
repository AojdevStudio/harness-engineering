repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
      - id: architecture-lint
        name: architecture lint
        entry: uv run python scripts/lint-architecture.py
        language: system
        pass_filenames: false
      - id: knowledge-lint
        name: knowledge lint
        entry: uv run python scripts/lint-knowledge.py
        language: system
        pass_filenames: false
      - id: harness-pr-review
        name: harness pr review
        entry: uv run python scripts/pr-review.py --base origin/main
        language: system
        pass_filenames: false
      - id: tests
        name: pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
